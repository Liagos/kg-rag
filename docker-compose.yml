services:
  neo4j:
    image: neo4j:5
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER}/${NEO4J_PASSWORD}"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test:
        ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER} -p ${NEO4J_PASSWORD} 'RETURN 1'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  chromadb:
    build:
      context: .
      dockerfile: Dockerfile.chromadb
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    environment:
      ANONYMIZED_TELEMETRY: "false"
      IS_PERSISTENT: "true"
      PERSIST_DIRECTORY: "/data"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag
    tty: true
    stdin_open: true
    ports:
      - "8501:8501"
    depends_on:
      neo4j:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      PYTHONIOENCODING: "utf-8"
      CHROMA_HOST: "${CHROMA_HOST}"
      CHROMA_PORT: "${CHROMA_PORT}"
      NEO4J_URI: "${NEO4J_URI}"
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

volumes:
  neo4j_data:
  chroma_data:
  huggingface_cache: